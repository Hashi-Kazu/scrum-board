name: AI Coder

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-code:
    if: github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run AI Coder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/ai_coder.py

      - name: Create branch and commit changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="feature/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "feat: AI-generated changes for issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH" --force

      - name: Create draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH="feature/issue-${ISSUE_NUMBER}"
          PR_BODY=$(printf '## AI-generated changes\n\nThis PR was automatically generated by the AI Coder workflow in response to issue #%s.\n\nCloses #%s' "${ISSUE_NUMBER}" "${ISSUE_NUMBER}")
          gh pr create \
            --title "feat: ${ISSUE_TITLE}" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" \
            --draft
